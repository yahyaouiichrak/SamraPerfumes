name: Auth-Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/auth-service/**'
      - '.github/workflows/auth-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/auth-service/**'

env:
  SERVICE_NAME: auth-service
  WORKING_DIR: apps/auth-service

jobs:
  # ==============================================
  # JOB 1: Lint & Format Check
  # ==============================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm lint || echo "⚠️ ESLint warnings (non-blocking)"
        continue-on-error: true
      
      - name: Check Prettier formatting
        working-directory: ${{ env.WORKING_DIR }}
        run: pnpm format:check || echo "⚠️ Format issues (non-blocking)"
        continue-on-error: true

  # ==============================================
  # JOB 2: Unit Tests
  # ==============================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run unit tests
        run: pnpm --filter auth-service test:unit

  # ==============================================
  # JOB 3: Integration Tests
  # ==============================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.0.0
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5433 -U test_user; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
      
      - name: Run integration tests
        run: pnpm --filter auth-service test:integration
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          JWT_SECRET: test-jwt-secret-key-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-key-minimum-32-chars
      
      - name: Upload test coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ${{ env.WORKING_DIR }}/coverage/lcov.info
          flags: auth-service
          name: auth-service-coverage
          fail_ci_if_error: false

  # ==============================================
  # JOB 4: SonarCloud Analysis (VERSION FINALE QUI MARCHE)
  # ==============================================
  #sonarcloud:
  #  name: SonarCloud Analysis
  #  runs-on: ubuntu-latest
  #  needs: [test-unit, test-integration]
    
  #  steps:
  #    - name: Checkout code
  #      uses: actions/checkout@v4
  #      with:
  #        fetch-depth: 0
      
  #    - name: Setup Node.js
  #      uses: actions/setup-node@v4
  #      with:
  #        node-version: '20'
      
  #    - name: Install pnpm
  #      uses: pnpm/action-setup@v2
  #      with:
  #        version: 9.0.0
      
  #    - name: Install dependencies
  #      run: pnpm install --frozen-lockfile
      
  #    - name: Run tests for coverage
  #      working-directory: ${{ env.WORKING_DIR }}
  #      run: pnpm test:coverage || true
  #      env:
  #        NODE_ENV: test
      
  #    - name: SonarCloud Scan
  #      uses: SonarSource/sonarcloud-github-action@master
  #      env:
  #        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==============================================
  # JOB 5: Security Scan (Trivy) - CORRIGÉ
  # ==============================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    permissions:
      contents: read
      security-events: write
      actions: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          docker build \
            --target production \
            -t ${{ env.SERVICE_NAME }}:${{ github.sha }} \
            .
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SERVICE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==============================================
  # JOB 6: Build Summary
  # ==============================================
  build-summary:
    name: ✅ CI/CD Summary
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-integration, security-scan]
    if: always()
    steps:
      - run: |
          echo "## 🎯 Auth-Service CI/CD Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Code Quality | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test-unit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.test-integration.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Notes" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ All critical jobs completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🔒 Security scan via Trivy" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Code quality via ESLint" >> $GITHUB_STEP_SUMMARY
          echo "- ⚠️ SonarCloud disabled (will be re-enabled in Sprint 3 with Azure)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY